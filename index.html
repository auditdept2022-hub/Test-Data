<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Drive — Quick Links</title>
<style>
  :root{
    --navy-900:#101d3f;
    --navy-800:#16295c;
    --navy-700:#1e3a72;
    --panel-bg:#ffffff;
    --amber-100:#fdecd2;
    --amber-600:#d97706;
    --text-900:#0f1b38;
    --text-500:#5b6a8f;
    --border:#e7eaf3;
    --focus:#3b82f6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    background:#eef1f8;
    display:flex;
    justify-content:center;
    padding:32px 16px;
  }
  .panel{
    width:320px;
    background:var(--panel-bg);
    border-radius:16px;
    box-shadow:0 20px 40px -20px rgba(16,29,63,0.35);
    overflow:hidden;
    border:1px solid var(--border);
  }
  .panel-header{
    background:linear-gradient(135deg,var(--navy-800),var(--navy-700));
    color:#fff;
    padding:16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .panel-header h1{
    font-size:15px;
    margin:0;
    font-weight:700;
    letter-spacing:.3px;
  }
  .close-x{
    background:rgba(255,255,255,0.12);
    border:none;
    color:#fff;
    width:26px;
    height:26px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
  }
  .close-x:hover{ background:rgba(255,255,255,0.22); }

  .section{
    padding:14px 18px 6px;
  }
  .section-title{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    font-weight:700;
    letter-spacing:.06em;
    color:var(--text-500);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .count-badge{
    background:#eef1f8;
    color:var(--text-500);
    font-size:11px;
    font-weight:700;
    border-radius:999px;
    padding:1px 7px;
  }

  .search{
    margin:0 18px 12px;
  }
  .search input{
    width:100%;
    padding:9px 12px;
    border:1px solid var(--border);
    border-radius:10px;
    font-size:13px;
    outline:none;
    background:#f7f8fc;
    color:var(--text-900);
  }
  .search input:focus{
    border-color:var(--focus);
    background:#fff;
    box-shadow:0 0 0 3px rgba(59,130,246,0.15);
  }

  .links{
    list-style:none;
    margin:0;
    padding:0 12px 16px;
    max-height:420px;
    overflow-y:auto;
  }
  .links::-webkit-scrollbar{ width:8px; }
  .links::-webkit-scrollbar-thumb{ background:#dde2f0; border-radius:8px; }

  .link-item a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 10px;
    margin:2px 0;
    border-radius:10px;
    text-decoration:none;
    color:var(--text-900);
    font-size:13.5px;
    font-weight:600;
    border:1px solid transparent;
    transition:background .12s ease, border-color .12s ease, transform .12s ease;
  }
  .link-item a:hover{
    background:#f7f8fc;
    border-color:var(--border);
    transform:translateX(2px);
  }
  .link-item a:focus-visible{
    outline:2px solid var(--focus);
    outline-offset:2px;
  }
  .icon-box{
    flex:0 0 auto;
    width:30px;
    height:30px;
    border-radius:8px;
    background:var(--amber-100);
    color:var(--amber-600);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .icon-box svg{ width:15px; height:15px; }

  .empty{
    padding:24px 10px;
    text-align:center;
    color:var(--text-500);
    font-size:13px;
    display:none;
  }

  .hint{
    padding:10px 18px 16px;
    font-size:11.5px;
    color:var(--text-500);
    border-top:1px solid var(--border);
    line-height:1.5;
  }
  .hint code{
    background:#f2f4fa;
    padding:1px 4px;
    border-radius:4px;
  }
</style>
</head>
<body>

<div class="panel">
  <div class="panel-header">
    <h1>Audit Drive</h1>
    <button class="close-x" aria-label="Close">✕</button>
  </div>

  <div class="section">
    <div class="section-title">
      Quick Links <span class="count-badge" id="linkCount">0</span>
    </div>
  </div>

  <div class="search">
    <input type="text" id="filterInput" placeholder="Search folders..." autocomplete="off">
  </div>

  <ul class="links" id="linksList">
    <!-- Items are generated from FOLDERS below -->
  </ul>
  <div class="empty" id="emptyState">No folders match your search.</div>

  <div class="hint">
    Replace each folder's <code>url</code> below with its actual Google Drive
    share link (right‑click the folder in Drive → <em>Share → Copy link</em>),
    then re‑open this file.
  </div>
</div>

<script>
  // ---- EDIT THIS LIST ----
  // name  = label shown in the quick-links panel
  // url   = the folder's Google Drive share link
  const FOLDERS = [
    { name: "AUDIT (root)",             url: "https://drive.google.com/drive/folders/1wu4kj1EnytoxQr-MFsltuqByxcIrSiEr?usp=sharing" },
    { name: "ACCTG",                    url: "https://drive.google.com/drive/folders/1TIcW-wLPN78erQ57EBb9-bbGtYQuW06G" },
    { name: "ADMIN",                    url: "#" },
    { name: "ALFONSO",                  url: "#" },
    { name: "ANGELES",                  url: "#" },
    { name: "ASSAP AND SALES DEPT",     url: "#" },
    { name: "ASSETS",                   url: "#" },
    { name: "ATIMONAN",                 url: "#" },
    { name: "AUDITOR'S DATA (OVERALL)", url: "#" },
    { name: "BACOOR 2",                 url: "#" },
    { name: "BACOOR CAVITE",            url: "#" },
    { name: "BATAAN",                   url: "#" },
    { name: "BATANGAS",                 url: "#" },
    { name: "BAY",                      url: "#" },
    { name: "BAYAMBANG",                url: "#" },
    { name: "BINALONAN",                url: "#" },
    { name: "BINANGONAN",               url: "#" },
    { name: "CALAMBA",                  url: "#" }
  ];

  const lockIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="10.5" width="16" height="10" rx="2"></rect>
      <path d="M7.5 10.5V7a4.5 4.5 0 0 1 9 0v3.5"></path>
    </svg>`;

  const listEl = document.getElementById('linksList');
  const countEl = document.getElementById('linkCount');
  const emptyEl = document.getElementById('emptyState');
  const filterEl = document.getElementById('filterInput');

  function render(items){
    listEl.innerHTML = '';
    items.forEach(f => {
      const li = document.createElement('li');
      li.className = 'link-item';
      const isPlaceholder = f.url === '#';
      li.innerHTML = `
        <a href="${f.url}" target="_blank" rel="noopener noreferrer" title="${isPlaceholder ? 'Add this folder\\'s Drive link' : f.name}">
          <span class="icon-box">${lockIcon}</span>
          <span>${f.name}</span>
        </a>`;
      listEl.appendChild(li);
    });
    emptyEl.style.display = items.length ? 'none' : 'block';
  }

  countEl.textContent = FOLDERS.length;
  render(FOLDERS);

  filterEl.addEventListener('input', () => {
    const q = filterEl.value.trim().toLowerCase();
    const filtered = FOLDERS.filter(f => f.name.toLowerCase().includes(q));
    render(filtered);
    countEl.textContent = filtered.length;
  });
</script>

</body>
</html>
