<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Audit Dashboard</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 60px auto; }
    .hidden { display: none; }
    #hamburgerBtn { font-size: 24px; cursor: pointer; background:none; border:none; }
    #menuItems { border: 1px solid #ddd; border-radius: 8px; margin-top: 8px; }
    #menuItems div { padding: 12px; cursor: pointer; }
    #menuItems div:hover { background: #f1f3f4; }
    .link-item { display: block; width: 100%; text-align: left; margin: 8px 0; padding: 12px;
                 background: #f1f3f4; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
    .link-item:hover { background: #e8eaed; }
    #status { color: #d93025; margin-top: 10px; }
  </style>
</head>
<body>

  <button id="hamburgerBtn" class="hidden" onclick="toggleMenu()">☰</button>
  <div id="menuItems" class="hidden">
    <div onclick="openQuickLinksTab()">📋 Quick Links</div>
  </div>

  <div id="signInArea">
    <div id="g_id_onload"
         data-client_id="YOUR_CLIENT_ID.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
  </div>

  <div id="quickLinksPanel" class="hidden"></div>
  <div id="status"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithCredential }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // Fill in with your real Firebase project config
    const firebaseConfig = {
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "your-project.firebaseapp.com",
      projectId: "your-project"
    };
    const app = initializeApp(firebaseConfig);
    window.auth = getAuth(app);

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzzAnYCe1Oc0SDG8tRLDGi_Ycr_zA65Awnaj-rgFPr70Tlz-wn6ouzlQqg-8SHa1p26fQ/exec";
    let currentToken = null;

    window.handleCredentialResponse = (response) => {
      currentToken = response.credential;
      document.getElementById("signInArea").classList.add("hidden");
      document.getElementById("hamburgerBtn").classList.remove("hidden");

      const credential = GoogleAuthProvider.credential(currentToken);
      signInWithCredential(window.auth, credential).catch(err => {
        document.getElementById("status").innerText = "Login error: " + err.message;
      });
    };

    window.toggleMenu = () => {
      document.getElementById("menuItems").classList.toggle("hidden");
    };

    // No extra password step: Google sign-in + the server-side email
    // allowlist in Apps Script is the real authorization check.
    window.openQuickLinksTab = () => {
      document.getElementById("menuItems").classList.add("hidden");
      loadLinkList();
    };

    window.loadLinkList = () => {
      const panel = document.getElementById("quickLinksPanel");
      panel.classList.remove("hidden");
      panel.innerText = "Loading...";

      fetch(APPS_SCRIPT_URL + "?token=" + encodeURIComponent(currentToken))
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            panel.innerHTML = data.links.map(l =>
              `<button class="link-item" onclick="openLink('${l.id}')">${l.label}</button>`
            ).join("");
          } else {
            panel.innerText = "Access denied: " + data.error;
          }
        })
        .catch(err => {
          panel.innerText = "Request failed: " + err.message;
        });
    };

    window.openLink = (id) => {
      const url = APPS_SCRIPT_URL + "?action=open&id=" + encodeURIComponent(id) +
                  "&token=" + encodeURIComponent(currentToken);
      window.open(url, "_blank");
    };
  </script>
</body>
</html>
